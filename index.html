<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung Kenanga 6 - Baru</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .menu-item { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <h1>Warung Kenanga 6</h1>
    <input type="text" id="cari" placeholder="Cari barang..." onkeyup="filter()">
    <div id="list">
        <div class="menu-item">Kopi Hitam - Rp 4.000</div>
        <div class="menu-item">Gorengan - Rp 1.500</div>
        <div class="menu-item">Beras (1 Kg) - Rp 15.000</div>
        <div class="menu-item">Minyak Goreng - Rp 18.000</div>
        <div class="menu-item">Gula Pasir - Rp 16.000</div>
        <div class="menu-item">Sabun Mandi - Rp 4.500</div>
    </div>
</div>
<script>
    function filter() {
        let val = document.getElementById('cari').value.toLowerCase();
        let items = document.getElementsByClassName('menu-item');
        for (let i of items) {
            i.style.display = i.innerText.toLowerCase().includes(val) ? "" : "none";
        }
    }
</script>
</body>
</html>
