<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Warung Kenanga 6</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; background: #ffffff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #1b4d3e; text-align: center; font-size: 22px; }
        #pencarian { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .daftar-barang { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-barang { background: #fafafa; border: 1px solid #eef2f1; padding: 10px; border-radius: 10px; text-align: center; }
        button { background-color: #2e7d32; color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; margin-top: 5px; }
        .btn-wa { background-color: #25d366; width: 100%; padding: 14px; margin-top: 20px; border: none; color: white; font-weight: bold; border-radius: 8px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏪 Warung Kenanga 6</h1>
    <input type="text" id="pencarian" placeholder="🔍 Cari nama barang..." onkeyup="filterBarang()">
    
    <div class="daftar-barang" id="list-barang">
        <div class="item-barang" data-nama="Kopi Hitam"><p>Kopi Hitam</p><p>Rp 4.000</p><button onclick="tambahBarang('Kopi Hitam', 4000)">Tambah</button></div>
        <div class="item-barang" data-nama="Gorengan"><p>Gorengan</p><p>Rp 1.500</p><button onclick="tambahBarang('Gorengan', 1500)">Tambah</button></div>
        <div class="item-barang" data-nama="Beras"><p>Beras (1 Kg)</p><p>Rp 15.000</p><button onclick="tambahBarang('Beras (1 Kg)', 15000)">Tambah</button></div>
        <div class="item-barang" data-nama="Minyak"><p>Minyak</p><p>Rp 18.000</p><button onclick="tambahBarang('Minyak Goreng', 18000)">Tambah</button></div>
    </div>

    <h2>Keranjang</h2>
    <table><tbody id="isi-keranjang"><tr><td>Belum ada barang</td></tr></tbody></table>
    <button class="btn-wa" onclick="kirimWhatsApp()">💬 Kirim ke WhatsApp</button>
</div>

<script>
    function filterBarang() {
        let input = document.getElementById('pencarian').value.toLowerCase();
        let items = document.getElementsByClassName('item-barang');
        for (let i = 0; i < items.length; i++) {
            let nama = items[i].getAttribute('data-nama').toLowerCase();
            items[i].style.display = nama.includes(input) ? "" : "none";
        }
    }
    
    let keranjang = [];
    function tambahBarang(nama, harga) {
        keranjang.push({ nama, harga });
        alert(nama + " ditambahkan!");
        document.getElementById("isi-keranjang").innerHTML = keranjang.map(i => `<tr><td>${i.nama}</td><td>Rp ${i.harga}</td></tr>`).join('');
    }

    function kirimWhatsApp() {
        let teks = "Pesanan saya: " + keranjang.map(i => i.nama).join(", ");
        window.open("https://api.whatsapp.com/send?phone=6287784542093&text=" + encodeURIComponent(teks) + "&d=" + Date.now());
    }
</script>
</body>
</html>
